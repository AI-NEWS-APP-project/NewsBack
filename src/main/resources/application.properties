spring.application.name=NewsBack
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

#---
#spring.config.activate.on-profile=dev

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:30859/newsdb}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:change-this-secret-key-to-at-least-32-bytes-long}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:14}

springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}

# OAuth
kakao.user-info-url=https://kapi.kakao.com/v2/user/me
google.user-info-url=https://www.googleapis.com/oauth2/v2/userinfo

# AI Server
ai.server.url=${AI_SERVER_URL:https://fb93-34-55-23-242.ngrok-free.app}
backend.url=${BACKEND_URL:https://port-0-newsback-mnhfhlid34c7c977.sel3.cloudtype.app}

# Firebase Cloud Messaging
firebase.credential.path=${FIREBASE_CREDENTIAL_PATH:}
